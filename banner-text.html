<h3>banner text:</h3>
<input id = "bannertextinput"/>

<script>

sticker_canvas  =document.getElementById("sticker_canvas");
ctx_sticker = sticker_canvas.getContext("2d");

textmessage = "TRASH ROBOT DOT NET";

//image_url = "https://www.trashrobot.net/DIRT-WIZARD/skyline-square.png";


var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        textmessage = this.responseText;
        ctx_sticker.font = "30px Arial";          // Sets font size and family
        ctx_sticker.fillStyle = "black";           // Sets the text color
        ctx_sticker.fillText(textmessage, 10,60);
        document.getElementById("bannertextinput").value = textmessage;
    }
};
httpc.open("GET", "load-file.php?filename=banner-text.txt", true);
httpc.send();

document.getElementById("bannertextinput").onchange = function(){
    textmessage = this.value;
    ctx_sticker.clearRect(0, 0, sticker_canvas.width, sticker_canvas.height);
    ctx_sticker.fillText(textmessage, 10,60);
    savetext();
}

function savetext(){
    var httpc = new XMLHttpRequest();
    httpc.open("POST", "save-file.php", true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+textmessage+"&filename=banner-text.txt");//send text to save-file.php
}
</script>
<style>
