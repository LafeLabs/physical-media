linewidthbuttons = document.getElementById("linewidth").getElementsByClassName("button");

linewidthbuttons[0].onclick = function(){
    strokeWeight(parseInt(this.innerHTML));
    brushstroke.strokewidth = float(100*parseInt(this.innerHTML)/width).toFixed(2);
    document.getElementById("strokewidthinput").value = brushstroke.strokewidth;    
}
linewidthbuttons[1].onclick = function(){

}

brushstroke = {
    "color":"black",

};


document.getElementById("strokewidthinput").value = brushstroke.strokewidth;


function setup() {

    squareWidth = 100;

    if(innerWidth > innerHeight){
        squareWidth = innerHeight - 100;
        document.getElementById("clearbutton").style.right = (innerWidth - squareWidth).toString() + "px";
        document.getElementById("feedscroll").style.height = (innerHeight - 70).toString() + "px";
        document.getElementById("feedscroll").style.width = (innerWidth - squareWidth - 100).toString() + "px";
    }
    else{
        squareWidth = innerWidth - 100;
        document.getElementById("feedscroll").style.width = (innerWidth - 30).toString() + "px";
        document.getElementById("feedscroll").style.height = (innerHeight - squareWidth).toString() + "px";    
    }
    
    document.getElementById("postbutton").style.left = (squareWidth/2 - 100).toString() + "px";
    
    
    createCanvas(squareWidth,squareWidth);
    
    
    document.getElementById("main_image_canvas").width =squareWidth; 
    document.getElementById("main_image_canvas").height =squareWidth; 

//    background(159,135,103);
    stroke(0);
    strokeWeight(10);
    brushstroke.strokewidth = (100*30/width).toFixed(2);
    document.getElementById("strokewidthinput").value = brushstroke.strokewidth;
    
//      image(img, 0, 0,squareWidth-50,squareWidth-70);

    var httpcicon = new XMLHttpRequest();
    httpcicon.onreadystatechange = function(){
        if (this.readyState == 4 && this.status == 200) {
            icon = JSON.parse(this.responseText);
            drawicon();
        }
    };
    httpcicon.open("GET", "load-file.php?filename=icon.json", true);
    httpcicon.send();

}

inLine = false;

function draw() {
  
  if(mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height){
      if (mouseIsPressed === true) {
        if(inLine == false){
            var  point = {};
            point.x = (100*mouseX/width).toFixed(1);
            point.y = (100*mouseY/width).toFixed(1);
            brushstroke.points.push(point);
        }
        line(mouseX, mouseY, pmouseX, pmouseY);
        inLine = true;
        if(mouseX != pmouseX || mouseY != pmouseY){
            var  point = {};
            point.x = (100*mouseX/width).toFixed(1);
            point.y = (100*mouseY/width).toFixed(1);
            brushstroke.points.push(point);
        }
      }
      else{
          if(inLine){
              icon.push(JSON.parse(JSON.stringify(brushstroke)));
              brushstroke.points = [];
          }
          inLine = false;
      }
  }
}


function drawicon(){
    clear();
    //background(159,135,103);
    for(var strokeindex = 0;strokeindex < icon.length;strokeindex++){
        for(var pointindex = 1;pointindex < icon[strokeindex].points.length;pointindex++){
            
            stroke(icon[strokeindex].color);
            strokeWeight(Math.round(0.01*width*icon[strokeindex].strokewidth));
            line(0.01*width*icon[strokeindex].points[pointindex - 1].x,0.01*width*icon[strokeindex].points[pointindex - 1].y,0.01*width*icon[strokeindex].points[pointindex].x,0.01*width*icon[strokeindex].points[pointindex].y);
        }
    }
}

document.getElementById("deletebutton").onclick = function(){
    icon.pop();
    clear();
    //background(159,135,103);
    for(var strokeindex = 0;strokeindex < icon.length;strokeindex++){
        for(var pointindex = 1;pointindex < icon[strokeindex].points.length;pointindex++){
            
            stroke(icon[strokeindex].color);
            strokeWeight(Math.round(0.01*width*icon[strokeindex].strokewidth));
            line(0.01*width*icon[strokeindex].points[pointindex - 1].x,0.01*width*icon[strokeindex].points[pointindex - 1].y,0.01*width*icon[strokeindex].points[pointindex].x,0.01*width*icon[strokeindex].points[pointindex].y);
        }
    }
}


document.getElementById("clearbutton").onclick = function(){
    icon = [];
    clear();
   // background(159,135,103);
}

document.getElementById("postbutton").onclick = function(){
    //SAVE ICON AS icon.json
    var url = "save-file.php";        
    var httpc = new XMLHttpRequest();
    httpc.open("POST", url, true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+encodeURIComponent(JSON.stringify(icon,null,"    "))+"&filename=icon.json");//send text to filesaver.php
    
}



var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        image_url = this.responseText;
        document.getElementById("main_image").src = image_url;
    }
};
httpc.open("GET", "load-file.php?filename=sticker-image-url.txt", true);
httpc.send();



document.getElementById("main_image").onload = function(){
    main_image_canvas  =document.getElementById("main_image_canvas");
    ctx_main_image_canvas = main_image_canvas.getContext("2d");
    ctx_main_image_canvas.filter = "grayscale(100%) brightness(200%) contrast(200%)";
    
    ctx_main_image_canvas.drawImage(this,0,0,squareWidth,squareWidth*this.height/this.width);
    
}
