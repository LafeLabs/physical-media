icon = [];


function setup(){
    
    createCanvas(380,380);

    p5canvas = document.getElementsByTagName("MAIN")[0].getElementsByTagName("CANVAS")[0];

    if(media.icon.display){
        ctx_sticker.drawImage(p5canvas,media.icon.x,media.icon.y,media.icon.width,media.icon.width);                
    }

    
    var httpcicon = new XMLHttpRequest();
    httpcicon.onreadystatechange = function(){
        if (this.readyState == 4 && this.status == 200) {
            icon = JSON.parse(this.responseText);
            drawicon();
        }
    };
    httpcicon.open("GET", "load-file.php?filename=icon.json", true);
    httpcicon.send();

}



function draw(){
    //p5canvas = document.getElementsByTagName("MAIN")[0].getElementsByTagName("CANVAS");
        if(media.icon.display){
            ctx_sticker.drawImage(p5canvas,media.icon.x,media.icon.y,media.icon.width,media.icon.width);                
        }

}


function drawicon(){
    clear();
    //background(159,135,103);
    for(var strokeindex = 0;strokeindex < icon.length;strokeindex++){
        for(var pointindex = 1;pointindex < icon[strokeindex].points.length;pointindex++){
            
            stroke(icon[strokeindex].color);
            strokeWeight(Math.round(0.01*width*icon[strokeindex].strokewidth));
            line(0.01*width*icon[strokeindex].points[pointindex - 1].x,0.01*width*icon[strokeindex].points[pointindex - 1].y,0.01*width*icon[strokeindex].points[pointindex].x,0.01*width*icon[strokeindex].points[pointindex].y);
        }
    }
}



var httpcHypercube = new XMLHttpRequest();
httpcHypercube.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        hypercube = JSON.parse(this.responseText);
        mainGVM.importbytecode(hypercube);    
        currentjson = {};
        var httpcjson = new XMLHttpRequest();
            httpcjson.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                currentjson = JSON.parse(this.responseText);
                
                mainGVM.importbytecode(currentjson.shapes);  
                mainGVM.width = currentjson.width;
                mainGVM.height = currentjson.height;
                mainGVM.unit = currentjson.unit;
                mainGVM.x0 = currentjson.x0;
                mainGVM.y0 = currentjson.y0;
                mainGVM.style.line0 = currentjson.style.line0;
                mainGVM.drawGlyph(currentjson.glyph);
                if(media.geometron.display){
                    ctx_sticker.drawImage(geometron_canvas, media.geometron.x, media.geometron.y);                    
                }


            }
        };
        httpcjson.open("GET", "load-file.php?filename=geometron-icon.json", true);
        httpcjson.send();
    }
};
