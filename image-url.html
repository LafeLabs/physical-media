<body>

            <h1>IMAGE URL:</h1>
            
            <input id  ="imageurlinput"/>
<img id = "main-image">
<script>

var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        image_url = this.responseText;
        document.getElementById("main-image").src = image_url;
        document.getElementById("imageurlinput").value = image_url;
    }
};
httpc.open("GET", "load-file.php?filename=image-url.txt", true);
httpc.send();

//https://www.trashrobot.net/DIRT-WIZARD/skyline-square.png

document.getElementById("imageurlinput").onchange = function(){
    image_url = this.value;
    document.getElementById("main-image").src = image_url;
    var httpc = new XMLHttpRequest();
    httpc.open("POST", "save-file.php", true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+image_url+"&filename=image-url.txt");//send text to filesaver.php
}

</script>
<style>
#main-image{
    border:solid;
    max-width:400px;
}
#imageurlinput{
    width:90%;
}
</style>
</body>
