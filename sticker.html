geometron_glyph = "0306,0335,0331,0362,0203,0203,0335,0335,0350,0335,0312,0337,0203,0335,0335,0335,0335,0203,0335,0335,0335,0335,0336,0335,0203,0203,0334,0334,0334,0334,0334,0337,0203,0334,0334,0334,0334,0203,0354,0335,0336,0331,0335,0335,0335,0335,0304,";//hexagram

geometron_glyph = "0336,0336,0332,0331,0332,0333,0337,0331,0337,0336,0332,0337,0200,0336,0333,0337,0333,0200,0330,0332,0350,0335,0201,0335,0201,0335,0335,0335,0342,0334,0201,0335,0201,0335,0330,0330,0336,0331,0335,0335,0335,0342,0337,0332,0342,0330,0335,0335,0335,0336,0342,0335,0335,0337,0201,0334,0201,0300,0330,0332,0336,0330,0332,0331,0336,0330,0337,01107,01105,01117,01115,01105,01124,01122,01117,01116,0331,0331,0331,0331,0331,0332,0332,0331,0332,0332,0332,0332,0332,01110,01131,01120,01105,01122,01103,01125,01102,01105,";//hypercube

geometron_canvas = document.getElementById("geometron_canvas");


mainGVM = new GVM(geometron_canvas,180,180);
mainGVM.importbytecode(hypercube);

//mainGVM.drawGlyph(geometron_glyph);

textmessage = "TRASH ROBOT DOT NET";

ctx_sticker.font = "30px Arial";          // Sets font size and family

ctx_sticker.fillText(textmessage, 10, 220);

//image_url = "https://www.trashrobot.net/DIRT-WIZARD/skyline-square.png";


var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        image_url = this.responseText;
        document.getElementById("main_image").src = image_url;
        ctx_sticker.drawImage(p5canvas,10,240,380,380);    
    
    }
};
httpc.open("GET", "load-file.php?filename=sticker-image-url.txt", true);
httpc.send();

main_image = document.getElementById("main_image");
main_image.onload = function(){
    ctx_sticker.filter = "grayscale(100%) brightness(200%)";
    ctx_sticker.drawImage(main_image,10,240,380,380*main_image.height/main_image.width);
   // p5canvas = document.getElementsByTagName("MAIN")[0].getElementsByTagName("CANVAS");
}

//document.getElementById("main_image").src = image_url;

icon = [];


function setup(){
    
    createCanvas(380,380);

    p5canvas = document.getElementsByTagName("MAIN")[0].getElementsByTagName("CANVAS")[0];
    ctx_sticker.drawImage(p5canvas,10,240,380,380);    
    
    
    var httpcicon = new XMLHttpRequest();
    httpcicon.onreadystatechange = function(){
        if (this.readyState == 4 && this.status == 200) {
            icon = JSON.parse(this.responseText);
            drawicon();
        }
    };
    httpcicon.open("GET", "load-file.php?filename=icon.json", true);
    httpcicon.send();

}



function draw(){
    //p5canvas = document.getElementsByTagName("MAIN")[0].getElementsByTagName("CANVAS");
        ctx_sticker.drawImage(p5canvas,10,240,380,380);    

}


function drawicon(){
    clear();
    //background(159,135,103);
    for(var strokeindex = 0;strokeindex < icon.length;strokeindex++){
        for(var pointindex = 1;pointindex < icon[strokeindex].points.length;pointindex++){
            
            stroke(icon[strokeindex].color);
            strokeWeight(Math.round(0.01*width*icon[strokeindex].strokewidth));
            line(0.01*width*icon[strokeindex].points[pointindex - 1].x,0.01*width*icon[strokeindex].points[pointindex - 1].y,0.01*width*icon[strokeindex].points[pointindex].x,0.01*width*icon[strokeindex].points[pointindex].y);
        }
    }
}



var httpcHypercube = new XMLHttpRequest();
httpcHypercube.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        hypercube = JSON.parse(this.responseText);
        mainGVM.importbytecode(hypercube);    
        currentjson = {};
        var httpcjson = new XMLHttpRequest();
            httpcjson.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                currentjson = JSON.parse(this.responseText);
                mainGVM.drawGlyph(currentjson.glyph);
                ctx_sticker.drawImage(geometron_canvas, 210, 10);

            }
        };
        httpcjson.open("GET", "load-file.php?filename=geometron-icon.json", true);
        httpcjson.send();
    }
};
httpcHypercube.open("GET", "load-file.php?filename=hypercube.json", true);
httpcHypercube.send();
